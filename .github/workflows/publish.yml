name: Publish

on:
  release:
    types: [published]

jobs:
  resolve-package:
    runs-on: ubuntu-latest
    outputs:
      package: ${{ steps.resolve.outputs.package }}
    steps:
      - id: resolve
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [[ "$TAG" == react-hook-stability-v* ]]; then
            echo "package=eslint-plugin-react-hook-stability" >> "$GITHUB_OUTPUT"
          fi
          # Add future packages here:
          # if [[ "$TAG" == other-plugin-v* ]]; then
          #   echo "package=other-plugin" >> "$GITHUB_OUTPUT"
          # fi

  publish:
    needs: resolve-package
    if: needs.resolve-package.outputs.package != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build -w packages/${{ needs.resolve-package.outputs.package }}

      - run: npm test -w packages/${{ needs.resolve-package.outputs.package }}

      - run: npm publish -w packages/${{ needs.resolve-package.outputs.package }} --provenance --access public
